workflows:
  ios-workflow:
    name: LinkVault iOS + Share Extension
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - code_signing
      vars:
        BUNDLE_ID: "com.linkvaultq8.app"
        MARKETING_VERSION: "1.0"
        BUILD_NUMBER: "33"
        SHARE_EXTENSION_BUNDLE_ID: "com.linkvaultq8.app.ShareExtension"
        APP_GROUP_ID: "group.com.linkvaultq8.shared"
        USE_APP_GROUPS: "true"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        IOS_DEPLOYMENT_TARGET: "14.0"
      node: 20.18.0
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: |
          set -euo pipefail
          echo "BUILD_FIX_ID: linkvault-npm-clean-v2-20260713"
          echo "Project directory: $(pwd)"
          echo "Using package-lock: $(pwd)/package-lock.json"

          # Use a clean npm configuration and a build-local cache so a stale
          # Codemagic/global cache cannot reintroduce a private registry URL.
          cat > "$PWD/.npmrc.ci" <<'EOF'
          registry=https://registry.npmjs.org/
          @capacitor-mlkit:registry=https://registry.npmjs.org/
          @capacitor:registry=https://registry.npmjs.org/
          @ionic:registry=https://registry.npmjs.org/
          @revenuecat:registry=https://registry.npmjs.org/
          audit=false
          fund=false
          update-notifier=false
          fetch-retries=6
          fetch-retry-factor=2
          fetch-retry-mintimeout=15000
          fetch-retry-maxtimeout=120000
          fetch-timeout=600000
          omit-lockfile-registry-resolved=true
          EOF
          export NPM_CONFIG_USERCONFIG="$PWD/.npmrc.ci"
          export NPM_CONFIG_REGISTRY="https://registry.npmjs.org/"

          # Remove every registry tarball URL from lockfiles. npm will resolve all
          # package downloads through the public scoped registries above.
          python3 - <<'PY'
          import json
          from pathlib import Path

          def strip_resolved(value):
              if isinstance(value, dict):
                  value.pop('resolved', None)
                  for child in value.values():
                      strip_resolved(child)
              elif isinstance(value, list):
                  for child in value:
                      strip_resolved(child)

          for path in Path('.').rglob('package-lock.json'):
              data = json.loads(path.read_text(encoding='utf-8'))
              strip_resolved(data)
              path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
              print(f'Prepared registry-neutral lockfile: {path}')
          PY

          if grep -R -n '"resolved"[[:space:]]*:' --include='package-lock.json' .; then
            echo "Error: a lockfile still contains a resolved registry URL"
            exit 1
          fi

          echo "QR package lock entry:"
          grep -A4 -B1 'node_modules/@capacitor-mlkit/barcode-scanning' package-lock.json || true
          echo "npm registry: $(npm config get registry)"
          echo "QR scope registry: $(npm config get @capacitor-mlkit:registry)"
          echo "RevenueCat scope registry: $(npm config get @revenuecat:registry)"

          rm -rf node_modules "$PWD/.npm-cache"
          npm cache clean --force || true
          npm ci --include=dev --no-audit --no-fund --prefer-online \
            --cache="$PWD/.npm-cache" \
            --registry=https://registry.npmjs.org/
      - name: Add iOS platform if missing
        script: |
          test -d ios || npx --no-install cap add ios
      - name: Generate iOS app assets
        script: |
          bash scripts/generate-ios-assets.sh
      - name: Sync web assets and native plugins
        script: |
          npx --no-install cap sync ios
      - name: Add native iOS Share Extension
        script: |
          gem install xcodeproj --no-document
          ruby scripts/add-ios-share-extension.rb
      - name: CocoaPods installation
        script: |
          cd ios/App
          pod install
      - name: Set up keychain for code signing
        script: |
          keychain initialize
      - name: Fetch signing files for app and share extension
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          app-store-connect fetch-signing-files "$SHARE_EXTENSION_BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Apply provisioning profiles to Xcode project
        script: |
          xcode-project use-profiles --project ios/App/App.xcodeproj
      - name: Increment build number
        script: |
          cd ios/App
          agvtool new-version -all $BUILD_NUMBER || true
      - name: Build ipa for TestFlight
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - ios/App/App.xcodeproj/project.pbxproj
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

